name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/build.keychain-db
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"

      - name: Build signed app
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodegen generate
          xcodebuild -project Fader.xcodeproj -scheme Fader -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            -derivedDataPath build build

      - name: Package dmg
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist/dmg
          cp -R build/Build/Products/Release/Fader.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "Fader" -srcfolder dist/dmg -ov -format UDZO \
            "dist/Fader-$VERSION.dmg"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          xcrun notarytool submit "dist/Fader-$VERSION.dmg" \
            --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APP_PASSWORD" --wait
          xcrun stapler staple "dist/Fader-$VERSION.dmg"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "$GITHUB_REF_NAME" "dist/Fader-$VERSION.dmg" \
            --title "Fader $VERSION" --generate-notes
